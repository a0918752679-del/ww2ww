<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>刮刮樂</title><link rel="stylesheet" href="/style.css"></head><body><header class="top"><a class="brand" href="/"><span class="logo">∞</span><div><b>我的刮刮卡</b><small>付款確認後自動發放</small></div></a><a class="pill" href="/shop.html">購買</a></header><main class="app"><section class="hero"><div><span class="tag">Scratch Time</span><h1>點擊卡片立即刮開。</h1><p>中獎後會跳出寄件資料表，填完後寫入出貨管理。</p></div><div class="scratchPad" id="pad">選擇一張卡</div></section><section><div class="sectionHead"><h2>可用卡片</h2><a href="/member.html">查看紀錄</a></div><div id="cards" class="cards"></div></section><section class="panel" id="shipBox" style="display:none"><h2>中獎寄件資料</h2><div class="form"><input id="recipientName" placeholder="收件人姓名"><input id="recipientPhone" placeholder="收件人手機"><input id="zip" placeholder="郵遞區號"><input id="city" placeholder="縣市"><input id="district" placeholder="區域"><textarea id="address" placeholder="詳細地址"></textarea><input id="storePickup" placeholder="超商取貨門市（選填）"><button class="btn primary" onclick="submitShip()">送出寄件資料</button><p id="msg" class="mini"></p></div></section></main><nav class="tabbar"><a href="/">首頁</a><a href="/shop.html">商城</a><a class="on" href="/scratch.html">刮卡</a><a href="/member.html">會員</a></nav><script>
let selected='',winnerId='';function token(){return localStorage.token||''}
async function load(){if(!token())return location='/login.html';const r=await fetch('/api/my/cards',{headers:{Authorization:'Bearer '+token()}});const d=await r.json();cards.innerHTML=d.map(c=>`<article class="prize" onclick="selectCard('${c.cardId}','${c.status}')"><span>${c.status}</span><h3>${c.prizeName||'萬萬沒想到刮刮卡'}</h3><p>${c.status==='unused'?'點我選擇':'已使用'}</p></article>`).join('')||'<p class="alert">尚無卡片，請先購買並完成付款。</p>'}
function selectCard(id,status){if(status!=='unused')return;selected=id;pad.textContent='點我刮開';pad.onclick=play}
async function play(){if(!selected)return;pad.textContent='刮開中...';const r=await fetch('/api/scratch/play',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token()},body:JSON.stringify({cardId:selected})});const d=await r.json();if(!r.ok){pad.textContent=d.error;return}pad.textContent=d.result==='win'?'恭喜抽中：'+d.prizeName:'未中獎，再接再厲';if(d.winner){winnerId=d.winner.winnerId;shipBox.style.display='block'}load()}
async function submitShip(){const body={winnerId,recipientName:recipientName.value,recipientPhone:recipientPhone.value,zip:zip.value,city:city.value,district:district.value,address:address.value,storePickup:storePickup.value};const r=await fetch('/api/shipping/submit',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token()},body:JSON.stringify(body)});const d=await r.json();msg.textContent=r.ok?'已送出，後台會安排出貨。':d.error}
load();
</script></body></html>
