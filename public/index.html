<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>萬萬沒想到｜戰鬥陀螺線上一番賞</title><link rel="stylesheet" href="/style.css"></head><body>
<header class="top"><div class="brand"><span class="logo">∞</span><div><b>萬萬沒想到</b><small>戰鬥陀螺線上一番賞</small></div></div><a class="pill" href="/login.html">登入會員</a></header>
<main class="app"><section class="hero"><div class="heroText"><span class="tag">ONLINE KUJI 第1彈</span><h1>手機直接抽，商品與獎項庫存即時同步。</h1><p>購買商品後自動取得刮刮卡。付款確認後配卡，中獎自動扣庫存，避免抽中卻沒有貨。</p><div class="actions"><a class="btn primary" href="/shop.html">開始購買</a><a class="btn ghost" href="/scratch.html">我的刮刮卡</a></div></div><div class="toy"><img src="/assets/products/blade-premium.svg" alt="商品圖"><b>Last One</b><span>限定黑金版</span></div></section>
<section class="stats" id="stats"></section>
<section><div class="sectionHead"><h2>本期獎項庫存</h2><a href="/shop.html">查看商品</a></div><div id="prizes" class="cards"></div></section>
<section><div class="sectionHead"><h2>熱門商品</h2><a href="/shop.html">全部商品</a></div><div id="products" class="products"></div></section>
<section class="report"><h2>營運透明機制</h2><div class="grid2"><div><b>庫存保護</b><p>付款確認才扣商品庫存；中獎當下扣獎項庫存，獎項為 0 立即 Sold out。</p></div><div><b>紀錄留存</b><p>訂單、付款、中獎、寄件、記帳、Log 全部留存，可同步 Google Sheet。</p></div></div></section>
</main><nav class="tabbar"><a class="on" href="/">首頁</a><a href="/shop.html">商城</a><a href="/scratch.html">刮卡</a><a href="/member.html">會員</a></nav>
<script>
async function load(){const r=await fetch('/api/home');const d=await r.json();stats.innerHTML=`<div><b>${d.stats.activeProducts}</b><span>上架商品</span></div><div><b>${d.stats.paidOrders}</b><span>已付款訂單</span></div><div><b>$${d.stats.totalRevenue}</b><span>累積營收</span></div>`;prizes.innerHTML=d.prizeSummary.map(p=>`<article class="prize"><span>${p.tier}賞</span><h3>${p.name}</h3><p>剩餘 ${p.remaining} / ${p.stock}</p><em class="${p.remaining<=0?'sold':''}">${p.remaining<=0?'Sold out':'可抽中'}</em></article>`).join('');products.innerHTML=d.products.slice(0,6).map(p=>`<article class="product"><img src="${p.imageUrl||'/assets/products/blade-starter.svg'}"><div><h3>${p.name}</h3><p>${p.description||'戰鬥陀螺商品'}</p><b>$${p.price}</b><span>庫存 ${p.stock}</span></div></article>`).join('');}load();
</script></body></html>
