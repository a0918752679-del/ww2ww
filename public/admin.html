<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>後台管理</title><link rel="stylesheet" href="/style.css"></head><body><header class="top"><a class="brand" href="/"><span class="logo">∞</span><div><b>營運後台 V4</b><small>商品、活動、金流、庫存、出貨、AI摘要</small></div></a><button class="pill" onclick="loginBox()">登入</button></header><main class="app adminGrid"><aside class="side panel"><button onclick="show('dash')">總覽 Dashboard</button><button onclick="show('products')">商品上架</button><button onclick="show('campaigns')">活動 / Last One</button><button onclick="show('prizes')">獎項庫存</button><button onclick="show('orders')">今日紀錄 / 訂單</button><button onclick="show('shipping')">出貨管理</button><button onclick="show('finance')">付款 / 記帳</button><button onclick="genReport()">產生 AI 營運摘要</button></aside><section class="panel"><div id="content"><h1>請先登入後台</h1><p>預設密碼為環境變數 ADMIN_PASSWORD。</p></div></section></main><script>
function token(){return localStorage.adminToken||''}async function loginBox(){const password=prompt('後台密碼');if(!password)return;const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password})});const d=await r.json();if(!r.ok)return alert(d.error);localStorage.adminToken=d.token;load()}
async function admin(path,opt={}){const r=await fetch(path,{...opt,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token(),...(opt.headers||{})}});const d=await r.json();if(!r.ok)throw Error(d.error||'error');return d}
let data={};async function load(){if(!token())return;data=await admin('/api/admin/dashboard');show('dash')}
function table(rows,cols){return `<div class="table"><table><tr>${cols.map(c=>`<th>${c[1]}</th>`).join('')}</tr>${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c[0]]??''}</td>`).join('')}</tr>`).join('')}</table></div>`}
function show(tab){if(!token())return loginBox();if(tab==='dash')content.innerHTML=`<h1>總覽 Dashboard</h1><div class="stats"><div><b>$${data.revenue}</b><span>累積營收</span></div><div><b>${data.counts.todayOrders}</b><span>今日訂單</span></div><div><b>${data.counts.pendingPayments}</b><span>待確認付款</span></div></div><div class="grid2"><div class="panel"><h2>待出貨</h2><p>${data.counts.pendingShipping} 件</p></div><div class="panel"><h2>Sold out 獎項</h2><p>${data.counts.soldOutPrizes} 項</p></div></div><h2>低庫存商品</h2>${table(data.products.filter(p=>Number(p.stock)<=3),[['sku','SKU'],['name','商品'],['stock','庫存'],['enabled','啟用']])}`;
if(tab==='products')content.innerHTML=`<h1>商品上架</h1><div class="form"><input id="sku" placeholder="SKU"><input id="pname" placeholder="商品名稱"><input id="price" type="number" placeholder="價格"><input id="stock" type="number" placeholder="庫存"><input id="imageUrl" placeholder="圖片網址，可用 /assets/products/blade-starter.svg"><textarea id="desc" placeholder="商品描述"></textarea><button class="btn primary" onclick="addProduct()">新增商品</button></div><h2>商品清單</h2>${table(data.products,[['sku','SKU'],['name','商品'],['price','價格'],['stock','庫存'],['enabled','啟用']])}`;
if(tab==='campaigns')content.innerHTML=`<h1>活動 / Last One</h1><div class="form"><input id="cname" placeholder="活動名稱"><input id="heroTitle" placeholder="主標題"><input id="pricePerDraw" type="number" placeholder="每抽金額"><input id="totalTickets" type="number" placeholder="總抽數"><input id="lastOnePrize" placeholder="Last One 獎項"><textarea id="cdesc" placeholder="活動說明"></textarea><button class="btn primary" onclick="addCampaign()">新增活動</button></div>${table(data.campaigns||[],[['name','活動'],['status','狀態'],['pricePerDraw','每抽'],['totalTickets','總抽數'],['lastOnePrize','Last One']])}`;
if(tab==='prizes')content.innerHTML=`<h1>獎項庫存</h1><div class="form"><input id="tier" placeholder="等級 A/B/C/D"><input id="prizeName" placeholder="獎項名稱"><input id="prizeStock" type="number" placeholder="庫存"><input id="rate" type="number" placeholder="中獎率 %"><button class="btn primary" onclick="addPrize()">新增獎項</button></div>${table(data.prizes,[['tier','等級'],['name','獎項'],['stock','庫存'],['issued','已出'],['soldOut','Sold out'],['rate','機率']])}`;
if(tab==='orders')content.innerHTML=`<h1>訂單 / 今日紀錄</h1>${table(data.orders,[['createdAt','時間'],['orderId','訂單'],['amount','金額'],['paymentMethod','付款'],['paymentStatus','狀態'],['orderStatus','訂單狀態']])}<p class="mini">人工確認付款 API：POST /api/admin/orders/:id/mark-paid</p>`;
if(tab==='shipping')content.innerHTML=`<h1>出貨管理</h1>${table(data.shipping,[['createdAt','建立'],['recipientName','收件人'],['recipientPhone','手機'],['city','縣市'],['district','區域'],['address','地址'],['status','狀態'],['trackingNo','物流單號']])}`;
if(tab==='finance')content.innerHTML=`<h1>付款 / 記帳</h1><h2>付款單</h2>${table(data.payments,[['createdAt','時間'],['orderId','訂單'],['method','方式'],['amount','金額'],['status','狀態'],['providerTradeNo','交易編號']])}<h2>記帳</h2>${table(data.accounting,[['createdAt','時間'],['type','類型'],['category','分類'],['amount','金額'],['paymentMethod','方式'],['note','備註']])}`}
async function addProduct(){await admin('/api/admin/products',{method:'POST',body:JSON.stringify({sku:sku.value,name:pname.value,price:price.value,stock:stock.value,imageUrl:imageUrl.value,description:desc.value})});await load();show('products')}
async function addPrize(){await admin('/api/admin/prizes',{method:'POST',body:JSON.stringify({tier:tier.value,name:prizeName.value,stock:prizeStock.value,rate:rate.value})});await load();show('prizes')}
async function addCampaign(){await admin('/api/admin/campaigns',{method:'POST',body:JSON.stringify({name:cname.value,heroTitle:heroTitle.value,pricePerDraw:pricePerDraw.value,totalTickets:totalTickets.value,lastOnePrize:lastOnePrize.value,description:cdesc.value})});await load();show('campaigns')}
async function genReport(){const r=await admin('/api/admin/ai-report/generate',{method:'POST'});alert(r.summary+'\n'+JSON.parse(r.recommendations).join('\n'));await load()}
load();
</script></body></html>
