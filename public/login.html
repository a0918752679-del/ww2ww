<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>會員登入</title><link rel="stylesheet" href="/style.css"></head><body><header class="top"><a class="brand" href="/"><span class="logo">∞</span><div><b>會員入口</b><small>Google / Apple / 平台帳號</small></div></a></header><main class="app"><section class="hero"><div><span class="tag">Member Login</span><h1>登入後查看今日消費、刮卡與中獎紀錄。</h1><p>正式 OAuth 參數設定後可啟用 Google、Apple 登入；目前平台帳號可直接使用。</p><div class="actions"><button class="btn ghost" onclick="alert('請先於 Zeabur 設定 GOOGLE_OAUTH_URL')">Google 登入</button><button class="btn ghost" onclick="alert('請先於 Zeabur 設定 APPLE_OAUTH_URL')">Apple 登入</button></div></div><div class="panel"><div class="form"><input id="email" placeholder="Email"><input id="password" type="password" placeholder="密碼"><input id="name" placeholder="姓名（註冊用）"><input id="phone" placeholder="手機（註冊用）"><button class="btn primary" onclick="login()">登入</button><button class="btn ghost" onclick="register()">建立平台帳號</button><p id="msg" class="mini"></p></div></div></section></main><nav class="tabbar"><a href="/">首頁</a><a href="/shop.html">商城</a><a href="/scratch.html">刮卡</a><a class="on" href="/member.html">會員</a></nav><script>
async function api(path,body){const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok)throw Error(d.error||'error');return d}
async function login(){try{const d=await api('/api/auth/login',{email:email.value,password:password.value});localStorage.token=d.token;location='/member.html'}catch(e){msg.textContent=e.message}}
async function register(){try{const d=await api('/api/auth/register',{email:email.value,password:password.value,name:name.value,phone:phone.value});localStorage.token=d.token;location='/shop.html'}catch(e){msg.textContent=e.message}}
</script></body></html>
