<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>會員中心</title><link rel="stylesheet" href="/style.css"></head><body><header class="top"><a class="brand" href="/"><span class="logo">∞</span><div><b>會員中心</b><small>消費、卡片、中獎、點數</small></div></a><button class="pill" onclick="logout()">登出</button></header><main class="app"><section class="hero"><div><span class="tag">My Collection</span><h1 id="hello">會員中心</h1><p>這裡會連動個人今天與歷史消費內容、付款狀態、是否中獎，以及寄送進度。</p></div><div class="panel"><div class="stats" id="stats"></div></div></section><section><div class="sectionHead"><h2>我的訂單</h2><a href="/shop.html">繼續購買</a></div><div class="table"><table id="orders"></table></div></section><section><div class="sectionHead"><h2>我的刮刮卡</h2><a href="/scratch.html">前往刮卡</a></div><div id="cards" class="cards"></div></section></main><nav class="tabbar"><a href="/">首頁</a><a href="/shop.html">商城</a><a href="/scratch.html">刮卡</a><a class="on" href="/member.html">會員</a></nav><script>
function token(){return localStorage.token||''}function logout(){localStorage.removeItem('token');location='/login.html'}
async function load(){if(!token())return location='/login.html';const r=await fetch('/api/me',{headers:{Authorization:'Bearer '+token()}});if(!r.ok)return location='/login.html';const d=await r.json();hello.textContent=(d.customer?.name||'會員')+'，歡迎回來';stats.innerHTML=`<div><b>${d.customer?.points||0}</b><span>點數</span></div><div><b>${d.orders.length}</b><span>訂單</span></div><div><b>${d.cards.filter(c=>c.status==='unused').length}</b><span>可用卡</span></div>`;orders.innerHTML='<tr><th>日期</th><th>金額</th><th>付款</th><th>狀態</th></tr>'+d.orders.map(o=>`<tr><td>${String(o.createdAt).slice(0,10)}</td><td>$${o.amount}</td><td>${o.paymentMethod}</td><td>${o.paymentStatus}</td></tr>`).join('');cards.innerHTML=d.cards.map(c=>`<article class="prize"><span>${c.status==='unused'?'未使用':'已刮開'}</span><h3>${c.prizeName||'刮刮卡'}</h3><p>${c.result||'等待刮開'}</p></article>`).join('')||'<p class="alert">尚無刮刮卡，請先購買商品。</p>'}load();
</script></body></html>
