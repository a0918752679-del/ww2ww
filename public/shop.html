<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>商品商城</title><link rel="stylesheet" href="/style.css"></head><body><header class="top"><a class="brand" href="/"><span class="logo">∞</span><div><b>戰鬥陀螺商城</b><small>購買後付款確認即配卡</small></div></a><a class="pill" href="/member.html">會員中心</a></header><main class="app"><section class="report"><h1>選擇商品</h1><p>商品圖片直接呈現給客戶，庫存不足會禁止下單。每件商品預設可換 1 張刮刮卡。</p></section><div id="list" class="products"></div><section class="panel"><h2>結帳</h2><div id="cart" class="alert">尚未選擇商品</div><div class="form"><select id="method"><option value="bank_transfer">銀行匯款 / 人工確認</option><option value="line_pay">LINE Pay</option><option value="ecpay_credit">綠界信用卡</option><option value="ecpay_atm">綠界 ATM</option></select><button class="btn primary" onclick="checkout()">建立訂單</button><p id="msg" class="mini"></p></div></section></main><nav class="tabbar"><a href="/">首頁</a><a class="on" href="/shop.html">商城</a><a href="/scratch.html">刮卡</a><a href="/member.html">會員</a></nav><script>
let products=[],basket=[];function token(){return localStorage.token||''}function add(id){const p=products.find(x=>x.productId===id);if(!p)return;basket=[{productId:id,qty:1}];renderCart(p)}function renderCart(p){document.getElementById('cart').innerHTML=`已選擇：${p.name}<br>金額：$${p.price}<br>付款成功後取得 1 張刮刮卡`}
async function load(){products=await (await fetch('/api/products')).json();list.innerHTML=products.map(p=>`<article class="product"><img src="${p.imageUrl||'/assets/products/blade-starter.svg'}"><div><h3>${p.name}</h3><p>${p.description||'官方戰鬥陀螺商品'}</p><b>$${p.price}</b><span>${Number(p.stock)>0?'庫存 '+p.stock:'Sold out'}</span><button class="btn ${Number(p.stock)>0?'primary':'ghost'}" ${Number(p.stock)>0?'':'disabled'} onclick="add('${p.productId}')">加入購買</button></div></article>`).join('')}
async function checkout(){if(!token())return location='/login.html';if(!basket.length)return msg.textContent='請先選商品';const r=await fetch('/api/order/create',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token()},body:JSON.stringify({items:basket,paymentMethod:method.value})});const d=await r.json();if(!r.ok)return msg.textContent=d.error;msg.textContent=d.message+' '+(d.nextAction?.bankAccount||''); if(d.nextAction?.url) location=d.nextAction.url}
load();
</script></body></html>
